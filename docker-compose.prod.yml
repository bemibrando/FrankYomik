name: frank_yomik

services:
  redis:
    image: redis:7-alpine
    container_name: yomik-redis
    security_opt:
      - label:disable
    volumes:
      - /var/opt/docker/frank_yomik/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  init-perms:
    image: busybox
    container_name: yomik-init-perms
    security_opt:
      - label:disable
    volumes:
      - /var/opt/docker/frank_yomik/data/cache:/data/cache
    command: ["sh", "-c", "chown -R ${APP_UID:-1026}:${APP_GID:-1026} /data/cache"]
    restart: "no"

  api:
    image: localhost:3007/akitaonrails/frank-yomik-api:latest
    container_name: yomik-api
    user: "${APP_UID:-1026}:${APP_GID:-1026}"
    security_opt:
      - label:disable
    ports:
      - "8080:8080"
    environment:
      REDIS_URL: redis://redis:6379
      AUTH_TOKEN: ${AUTH_TOKEN:?Set AUTH_TOKEN in .env}
      CACHE_DIR: /data/cache
    volumes:
      - /var/opt/docker/frank_yomik/data/cache:/data/cache
    depends_on:
      redis:
        condition: service_healthy
      init-perms:
        condition: service_completed_successfully
    restart: always

  worker:
    image: localhost:3007/akitaonrails/frank-yomik-worker-rocm:latest
    # container_name omitted so docker compose can spin multiple replicas.
    # Each replica gets a unique hostname which the worker uses as its
    # Redis Streams consumer name.
    deploy:
      replicas: 2
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://192.168.0.90:11434}
      APP_UID: ${APP_UID:-1026}
      APP_GID: ${APP_GID:-1026}
      HSA_OVERRIDE_GFX_VERSION: "11.5.1"
      PYTORCH_ROCM_ARCH: "gfx1151"
    command: ["--pipeline", "both", "--redis-url", "redis://redis:6379"]
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    security_opt:
      - seccomp:unconfined
      - label:disable
    group_add:
      - "485"
      - "488"
    volumes:
      - /var/opt/docker/frank_yomik/data/cache:/app/server/cache
      - /var/opt/docker/frank_yomik/data/mangaocr-cache:/home/worker/.cache/manga_ocr
      - /var/opt/docker/frank_yomik/data/huggingface-cache:/home/worker/.cache/huggingface
      - /var/opt/docker/frank_yomik/data/easyocr-cache:/home/worker/.EasyOCR
      - /var/opt/docker/frank_yomik/config.prod.yaml:/app/server/config.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
      init-perms:
        condition: service_completed_successfully
    restart: always

  init-cloudflared:
    image: busybox
    container_name: yomik-init-cloudflared
    volumes:
      - /var/opt/docker/frank_yomik/.cloudflared:/src:ro
      - cloudflared-config:/dest
    command: ["sh", "-c", "cp /src/* /dest/ && chmod 644 /dest/*"]
    restart: "no"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: yomik-cloudflared
    command: tunnel --config /etc/cloudflared/config.yml run fdab897e-f6f9-4dee-ab84-bb1c5add5bde
    volumes:
      - cloudflared-config:/etc/cloudflared:ro
    depends_on:
      init-cloudflared:
        condition: service_completed_successfully
      api:
        condition: service_started
    restart: always

volumes:
  cloudflared-config:
